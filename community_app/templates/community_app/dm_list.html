{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/dm_list.css' %}">
{% endblock %}

{% block content %}

<div class="dm-list-container">

    <h2 class="dm-title">DM一覧</h2>

    <!-- 最初の広告 -->
    <div class="ad-container">
        <script type="text/javascript" src="https://j.zucks.net.zimg.jp/j?f=723047"></script>
    </div>

    <!-- ★ 最初の20件 -->
    <div id="dm-list">
        {% include "community_app/dm_list_partial.html" with room_data=room_data offset=0 %}
    </div>

    {% if has_more %}
        <button id="load-more-dm" class="load-more-btn">もっと見る</button>
    {% endif %}

</div>

<script>
let offset = 20;

document.getElementById("load-more-dm")?.addEventListener("click", function() {
    fetch(`/dm/load_more/?offset=${offset}`)
        .then(response => response.json())
        .then(data => {
            document.getElementById("dm-list").insertAdjacentHTML("beforeend", data.html);
            offset += 20;

            if (!data.has_more) {
                document.getElementById("load-more-dm").style.display = "none";
            }
        });
});
</script>

{% endblock %}
