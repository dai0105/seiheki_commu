{% load static %}

<link rel="stylesheet" href="{% static 'css/timeline.css' %}">

<div class="post-card">
    <a href="{% url 'profile' request.user.id %}" class="back-btn">＜ プロフィールへ戻る</a>

    <h2 class="post-title">新しい投稿</h2>

    <form id="postForm" class="post-form">
        {% csrf_token %}

        <textarea name="content_text" id="content_text" placeholder="本文を入力…"></textarea>
        <input type="file" name="image_file" id="image_file" accept="image/*">
        <input type="file" name="video_file" id="video_file" accept="video/*">

        <button type="button" onclick="submitPost()">投稿する</button>
    </form>
</div>

<script>
async function submitPost() {
    const formData = new FormData();
    formData.append("content_text", document.getElementById("content_text").value);

    const image = document.getElementById("image_file").files[0];
    const video = document.getElementById("video_file").files[0];

    if (image) formData.append("image_file", image);
    if (video) formData.append("video_file", video);

    const response = await fetch("/api/post/create/", {
        method: "POST",
        body: formData
    });

    if (response.ok) {
        window.location.href = "/profile/{{ request.user.id }}/";
    } else {
        alert("投稿に失敗しました");
    }
}
</script>
