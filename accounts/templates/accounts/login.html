{% load static %}

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <meta property="og:title" content="性癖コミュニティ - 新しいつながりを見つけよう">
    <meta property="og:description" content="価値観でつながる安心コミュニティ。匿名で気軽に話せる場所。">
    <meta property="og:image" content="https://seiheki-commu-1.onrender.com/static/OGP.png">
    <meta property="og:url" content="{{ request.build_absolute_uri }}">
    <meta property="og:type" content="website">
</head>

<body>

<div class="login-wrapper">

    <h2>ログイン</h2>

    {% if error %}
        <p class="error-message">{{ error }}</p>
    {% endif %}

    {% if subscription_expired %}
        <div class="expired-box">
            <p>サブスクリプションが終了しています。</p>
            <p>サービスを再開するには、再度決済が必要です。</p>
            <a href="{% url 'create_checkout_session' %}" class="reactivate-btn">再開する</a>
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <label>メールアドレス（ユーザー名）</label>
        <input type="text" name="username">

        <label>パスワード</label>
        <input type="password" name="password">

        <button type="submit">ログイン</button>

        <div class="forgot-link">
            <a href="{% url 'password_reset_request' %}">パスワードを忘れた方はこちら</a>
        </div>

        <div class="signup-link">
            <a href="{% url 'gender_select' %}">新規登録はこちら</a>
        </div>

    </form>


</div>

</body>
</html>
